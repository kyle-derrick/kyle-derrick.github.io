<script>
(function() {
    const themeToggle = document.getElementById('color-theme-toggle');
    const themeDropdown = document.getElementById('color-theme-dropdown');
    if (!themeToggle || !themeDropdown) return;
    
    const themeOptions = themeDropdown.querySelectorAll('.theme-option');
    
    
    const savedTheme = localStorage.getItem('blog-theme') || 'green';
    document.documentElement.setAttribute('data-color-theme', savedTheme);
    updateActiveTheme(savedTheme);
    
    
    themeToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        themeDropdown.classList.toggle('show');
    });
    
    
    document.addEventListener('click', function() {
        themeDropdown.classList.remove('show');
    });
    
    themeDropdown.addEventListener('click', function(e) {
        e.stopPropagation();
    });
    
    
    themeOptions.forEach(function(option) {
        option.addEventListener('click', function() {
            const theme = this.getAttribute('data-theme');
            document.documentElement.setAttribute('data-color-theme', theme);
            localStorage.setItem('blog-theme', theme);
            updateActiveTheme(theme);
            themeDropdown.classList.remove('show');
        });
    });
    
    function updateActiveTheme(theme) {
        themeOptions.forEach(function(option) {
            if (option.getAttribute('data-theme') === theme) {
                option.classList.add('active');
            } else {
                option.classList.remove('active');
            }
        });
    }
})();
</script>
