<script>
(function() {
    const themeToggle = document.getElementById('color-theme-toggle');
    const themeDropdown = document.getElementById('color-theme-dropdown');
    if (!themeToggle || !themeDropdown) return;
    
    const themeOptions = themeDropdown.querySelectorAll('.theme-option');
    
    
    const savedTheme = localStorage.getItem('blog-theme') || 'green';
    document.documentElement.setAttribute('data-color-theme', savedTheme);
    updateActiveTheme(savedTheme);
    
    
    themeToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        themeDropdown.classList.toggle('show');
    });
    
    
    document.addEventListener('click', function() {
        themeDropdown.classList.remove('show');
    });
    
    themeDropdown.addEventListener('click', function(e) {
        e.stopPropagation();
    });
    
    
    themeOptions.forEach(function(option) {
        option.addEventListener('click', function() {
            const theme = this.getAttribute('data-theme');
            document.documentElement.setAttribute('data-color-theme', theme);
            localStorage.setItem('blog-theme', theme);
            updateActiveTheme(theme);
            themeDropdown.classList.remove('show');
        });
    });
    
    function updateActiveTheme(theme) {
        themeOptions.forEach(function(option) {
            if (option.getAttribute('data-theme') === theme) {
                option.classList.add('active');
            } else {
                option.classList.remove('active');
            }
        });
    }
})();
</script>

<script>
    let menu = document.getElementById('menu')
    if (menu) {
        menu.scrollLeft = localStorage.getItem("menu-scroll-position");
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var mybutton = document.getElementById("top-link");
    window.onscroll = function () {
        if (document.body.scrollTop > 800 || document.documentElement.scrollTop > 800) {
            mybutton.style.visibility = "visible";
            mybutton.style.opacity = "1";
        } else {
            mybutton.style.visibility = "hidden";
            mybutton.style.opacity = "0";
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        if (document.body.className.includes("dark")) {
            document.body.classList.remove('dark');
            localStorage.setItem("pref-theme", 'light');
        } else {
            document.body.classList.add('dark');
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
